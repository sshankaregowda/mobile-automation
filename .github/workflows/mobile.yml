name: Mobile Automation

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  mobile-tests:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            device_key: android_pixel_7
            runner: ubuntu-latest

          - platform: ios
            device_key: ios_iphone_15
            runner: macos-latest

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Appium
        run: npm install -g appium@latest

      - name: Setup Appium Android driver
        if: matrix.platform == 'android'
        run: |
          appium driver uninstall uiautomator2 || true
          appium driver install uiautomator2@3.10.0

      - name: Setup Appium iOS driver
        if: matrix.platform == 'ios'
        run: |
          appium driver uninstall xcuitest || true
          appium driver install xcuitest@10.32.1

      - name: Enable KVM access
        if: matrix.platform == 'android'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
          sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm || true
          groups

      - name: Run Android tests
        if: matrix.platform == 'android'
        uses: ReactiveCircus/android-emulator-runner@v2
        env:
          DEVICE_KEY: ${{ matrix.device_key }}
        with:
          api-level: 36
          arch: x86_64
          profile: medium_phone
          emulator-options: -no-window -no-boot-anim -no-audio -no-snapshot-save
          script: |
            adb devices
            adb wait-for-device
            adb devices -l
            npm run test:mobile

      - name: Show available simulators
        if: matrix.platform == 'ios'
        run: xcrun simctl list devices

      - name: Boot iOS simulator
        if: matrix.platform == 'ios'
        env:
          DEVICE_KEY: ${{ matrix.device_key }}
        run: |
          xcrun simctl boot "iPhone 15" || true
          xcrun simctl bootstatus "iPhone 15" -b

      - name: Run iOS tests
        if: matrix.platform == 'ios'
        env:
          DEVICE_KEY: ${{ matrix.device_key }}
        run: |
          npm run test:mobile